  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {

      --bd-subtle: rgba(13, 148, 136, 0.12);
      --bot-bubble: #0F1F1A;
      --user-bubble: #0D9488;
      --radius: 16px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

    html, body {

      border-bottom: 1px solid var(--bd-subtle);
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      position: relative;
      flex-shrink: 0;
      object-fit: cover;

    .chat-avatar::after {
      content: '';

      bottom: 1px;
      right: 1px;

      height: 10px;

    /* ─── Typing Indicator ─── */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      margin-bottom: 8px;

    .typing-indicator.show { display: flex; }

    .typing-dots {

      border: 1px solid var(--bd-subtle);

    @keyframes dotBounce {

    /* ─── Quick Replies ─── */

    .quick-btn {
      background: var(--accent-soft);
      border: 1px solid var(--bd-subtle);
      color: var(--accent);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;

    .quick-btn:hover {
      background: var(--accent);

      border-color: var(--accent);

    /* ─── Input Bar ─── */
    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--bg-surface);
      border-top: 1px solid var(--bd-subtle);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--bd-subtle);
      border-radius: 24px;
      padding: 10px 18px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;

    .chat-input:focus { border-color: var(--accent); }

    .send-btn {

      border-radius: 50%;
      background: var(--accent);

      display: flex;

    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* ─── Animations ─── */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .chat-header { padding: 10px 14px; }
      .chat-messages { padding: 14px; }

      .chat-input-bar { padding: 10px 14px; }
      .msg-group { max-width: 92%; }
      .chat-header-badge { display: none; }
    }

  <script>
    // ─── State Management ───
    let KB = {};
    let config = {};
    let fallbackIdx = 0;
    let lastIntent = null; 
    let isTyping = false;  

    const messagesEl = document.getElementById('chatMessages');
    const inputEl = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typingIndicator');
    const quickEl = document.getElementById('quickReplies');

    const QUICK_SUGGESTIONS = [
      { text: "👤 About Aaryan", query: "Tell me about Aaryan" },
      { text: "🛠️ Skills", query: "What are his skills?" },
      { text: "🚀 Projects", query: "Show me his projects" },
      { text: "💼 Services", query: "What services does he offer?" },
      { text: "📞 Contact", query: "How to contact him?" },
      { text: "🏥 HealthTech", query: "Tell me about his HealthTech work" },
      { text: "🩺 Doctors Q&A", query: "How can he help doctors?" }
    ];

    const FALLBACK_RESPONSES = [
      "That's an interesting point! While I might not have a specific answer for that, I can tell you about Aaryan's **projects**, **skills**, **services**, or **how to get in touch**. What interests you?",
      "Hmm, I'm just a simulated assistant, so I might have misunderstood. 😅 Try asking me about his work experience, tech stack, or his HealthTech consulting services!",
      "I don't have information on that specific topic, but I'm great at answering questions about Aaryan's portfolio! Ask about his projects, skills, or services. 🚀"
    ];

    // Synonyms Map to improve matcher accuracy
    const SYNONYMS = {
      cost: ["pricing", "cost", "rates", "price", "fee", "fees", "how much", "charges", "charge", "expensive", "cheap", "hourly", "retainer", "budget", "money"],
      contact: ["contact", "reach", "email", "phone", "call", "connect", "get in touch", "hire", "talk", "whatsapp", "calendly", "meeting", "number", "mobile", "address", "location"],
      skills: ["skills", "tech", "technologies", "expertise", "proficient", "tools", "programming", "code", "languages", "stack"],
      healthtech: ["healthtech", "healthcare", "medical", "clinic", "hospital", "doctor", "emr", "patient", "practice", "opd", "prescription"],
      tokenq: ["tokenq", "queue"],
      rxpad: ["rxpad", "prescription pad", "generator"],
      labtrack: ["labtrack", "lab", "laboratory", "diagnostic"],
      recallmd: ["recallmd", "followup", "reminder", "reminders"],
      carereview: ["carereview", "review", "rating", "google reviews"]
    };

    // Conversational fillers/transitions to sound more human
    const TRANSITIONS = [
      "Ah, that's a great question!",
      "Sure! Let me explain that for you...",
      "Good point. Here are the details:",
      "Absolutely. Especially for doctors and clinic owners, this is important:",
      "Actually, that's something Aaryan specializes in.",
      "Certainly! Let me break that down:",
      "Yes, indeed!"
    ];

    // Helper functions
    function getTime() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>')
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>'); // support markdown links
    }

    function addMessage(text, isUser = false) {
      const group = document.createElement('div');
      group.className = `msg-group ${isUser ? 'user' : 'bot'}`;
      group.innerHTML = `
        ${isUser ? '<div class="avatar-sm">You</div>' : '<img loading="lazy" decoding="async" src="/assets/images/icons/aibot.png" alt="AI" class="avatar-sm" style="object-fit:cover; background:var(--bg-card); padding:2px; font-size:0;">'}
        <div class="msg-content">
          <div class="msg-bubble">${formatText(text)}</div>
          <span class="msg-time">${getTime()}</span>
        </div>
      `;
      messagesEl.appendChild(group);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      typingEl.classList.add('show');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      typingEl.classList.remove('show');
    }

    function renderQuickReplies(suggestions) {
      quickEl.innerHTML = suggestions.map(s =>
        `<button class="quick-btn" data-query="${s.query}">${s.text}</button>`
      ).join('');

      quickEl.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          handleSend(btn.dataset.query);
        });
      });
    }

    // Levenshtein Distance for fuzzy matching typos
    function getLevenshteinDistance(a, b) {
      if (!a || !b) return 0;
      const matrix = [];
      for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
      for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
          }
        }
      }
      return matrix[b.length][a.length];
    }

    // Advanced NLP Token Matcher with Weighted Scoring to prevent intent shadowing
    function matchIntent(input) {
      const rawInput = input.toLowerCase().trim();
      const cleanInput = rawInput.replace(/[^\w\s]/gi, ''); // remove punctuation
      const words = cleanInput.split(/\s+/);

      let bestIntent = null;
      let highestScore = -1;

      for (const [key, entry] of Object.entries(KB)) {
        for (const pattern of entry.patterns) {
          let score = 0;
          const cleanPattern = pattern.replace(/[^\w\s]/gi, '').toLowerCase();

          // Check for exact match
          if (cleanInput === cleanPattern) {
            score = 1000;
          }
          // Check for substring match
          else if (rawInput.includes(pattern) || cleanInput.includes(cleanPattern)) {
            // Score based on pattern length (longer patterns are more specific)
            score = pattern.length * 10;
            
            // If the pattern is a single word and it is a full word match in input, boost it
            if (!pattern.includes(' ') && words.includes(cleanPattern)) {
              score += 100;
            }
          }
          // Fuzzy match for single-word patterns
          else if (!pattern.includes(' ')) {
            for (let word of words) {
              if (Math.abs(word.length - pattern.length) <= 2) {
                const dist = getLevenshteinDistance(word, pattern);
                if (dist <= 1 && pattern.length > 3) {
                  score = 50 + (pattern.length * 5); // typo match score
                  break;
                }
              }
            }
          }
          // Multi-word token-based match (75% match)
          else {
            const patternWords = cleanPattern.split(/\s+/);
            let matches = 0;
            for (let pWord of patternWords) {
              if (words.includes(pWord)) matches++;
            }
            if (patternWords.length > 1 && (matches / patternWords.length >= 0.75)) {
              score = (matches / patternWords.length) * 150 + (pattern.length * 5);
            }
          }

          if (score > highestScore && score > 0) {
            highestScore = score;
            bestIntent = key;
          }
        }
      }

      // Dynamic overrides for primary product keys and specialized terms
      if (words.includes('tokenq')) return 'tokenq';
      if (words.includes('uibrium')) return 'uibrium';
      if (words.includes('projectport')) return 'projectport';
      if (words.includes('rxpad')) return 'rxpad';
      if (words.includes('labtrack')) return 'labtrack';
      if (words.includes('recallmd')) return 'recallmd';
      if (words.includes('carereview')) return 'carereview';

      return bestIntent;
    }

    function findResponse(input) {
      const lower = input.toLowerCase().trim().replace(/[^\w\s]/gi, '');
      const words = lower.split(/\s+/);
      
      // Synonym mappings
      const isPricingQuery = words.some(w => SYNONYMS.cost.includes(w));
      const isLinkQuery = words.some(w => ["link", "demo", "website", "live", "url", "github", "npm", "docs"].includes(w));
      const isSetupQuery = words.some(w => ["setup", "deploy", "install", "installation", "run", "configure", "deployment"].includes(w));
      const isCustomQuery = words.some(w => ["customize", "custom", "add", "change", "modify", "customization"].includes(w));

      // Shorthand pronoun detector (references the previous topic)
      const hasPronoun = words.some(w => ["it", "this", "app", "software", "system", "tool", "product", "service", "them", "these"].includes(w)) || words.length <= 3;

      // ─── Conversational Memory & Context Resolution ───
      if (lastIntent && (hasPronoun || words.length <= 4)) {
        if (isPricingQuery) {
          if (lastIntent === 'tokenq') return "💰 **TokenQ Pricing:** It is a **one-time setup fee of ₹6,000 to ₹12,000** depending on customization (such as hospital-wide screens). There are **no monthly fees** or subscription packages!";
          if (lastIntent === 'rxpad') return "💰 **RxPad Pro Pricing:** Deployed as a one-time purchase of **₹5,000 to ₹10,000** for clinic computers. This includes database setup, patient history storage, and zero monthly SaaS fees.";
          if (lastIntent === 'labtrack') return "💰 **LabTrack Pro Pricing:** One-time configuration fee of **₹15,000 to ₹35,000** to set up pathology sample flows, PDF reports, and WhatsApp automation gateways.";
          if (lastIntent === 'recallmd') return "💰 **RecallMD Pricing:** One-time purchase between **₹4,000 and ₹8,000** for patient appointment reminders and medication schedules.";
          if (lastIntent === 'carereview') return "💰 **CareReview Pricing:** Deployed for a one-time setup fee of **₹4,000 to ₹9,000** to integrate Maps review triggers.";
          if (lastIntent === 'microsaas') return KB.pricing.responses[0];
          if (lastIntent === 'maintenance') return "🔧 **Website Maintenance Contracts:** Retainers cost **₹2,000/month** (Essential), **₹4,000/month** (Professional), or **₹8,000/month** (Premium). Fully customizable and cancelable anytime.";
          if (lastIntent === 'services' || lastIntent === 'tpm') return "💼 **Agile PM Retainers:** Aaryan's TPM rates are ₹25k–₹80k per project, and dev team management retainers range from ₹25k–₹60k/month.";
        }

        if (isLinkQuery) {
          if (lastIntent === 'projectport') return "Sure! Check out the live project at [projectsport.vercel.app](https://projectsport.vercel.app) or inspect the repository: [github.com/aryanony/ProjectPort](https://github.com/aryanony/ProjectPort).";
          if (lastIntent === 'uibrium') return "Absolutely! Check out **UiBrium** live documentation here: [uibrium.vercel.app](https://uibrium.vercel.app) or NPM package: [npmjs.com/package/uibrium](https://www.npmjs.com/package/uibrium).";
          if (lastIntent === 'skills') return "You can see Aaryan's code repositories live on GitHub: [github.com/aryanony](https://github.com/aryanony).";
          if (lastIntent === 'contact' || lastIntent === 'services') return "You can book a call on Aaryan's calendar here: [calendly.com/aaryanpm/30min](https://calendly.com/aaryanpm/30min) or chat via WhatsApp: [wa.me/916205650368](https://wa.me/916205650368).";
        }

        if (isSetupQuery) {
          if (['tokenq', 'rxpad', 'labtrack', 'recallmd', 'carereview', 'healthtech', 'microsaas'].includes(lastIntent)) {
            return KB.setup_process.responses[Math.floor(Math.random() * KB.setup_process.responses.length)];
          }
        }

        if (isCustomQuery) {
          if (['tokenq', 'rxpad', 'labtrack', 'recallmd', 'carereview', 'healthtech', 'microsaas'].includes(lastIntent)) {
            return KB.customization.responses[Math.floor(Math.random() * KB.customization.responses.length)];
          }
        }
      }

      // Contextual Follow-up Memory for Yes/No replies
      const isAffirmative = lower === 'yes' || lower === 'sure' || lower.includes('tell me more') || lower === 'yeah' || lower === 'yep' || lower.includes('how');
      if (lastIntent && isAffirmative) {
          if (lastIntent === 'skills') return "Awesome! Check out Aaryan's GitHub to see his code repositories: [github.com/aryanony](https://github.com/aryanony).";
          if (lastIntent === 'projects' || lastIntent === 'projectport' || lastIntent === 'uibrium') return "You can see live demos of ProjectPort and UiBrium right here in the portfolio! They showcase his MERN-stack and deployment capabilities.";
          if (lastIntent === 'healthtech') return "Aaryan's Health-Tech work involves custom, self-hosted EMRs and clinic queues. Deployed on your server, meaning zero SaaS costs. Want to look at the setup process?";
          if (lastIntent === 'services') return "Great! You can easily book a 30-min discovery call at [calendly.com/aaryanpm/30min](https://calendly.com/aaryanpm/30min) to discuss your requirements.";
          if (lastIntent === 'location_jaipur' || lastIntent === 'location_ahmedabad') return "Aaryan has a deep understanding of local clinical needs. If you'd like to collaborate, let's schedule a call at [calendly.com/aaryanpm/30min](https://calendly.com/aaryanpm/30min).";
      }

      // Normal intent matching
      const intent = matchIntent(input);
      if (intent) {
        lastIntent = intent;
        const responses = KB[intent].responses;
        let reply = responses[Math.floor(Math.random() * responses.length)];

        // Prepend human-like conversational transitions (45% chance for professional intents)
        const nonFillerIntents = ['greeting', 'thanks', 'bye', 'smalltalk_howareyou', 'smalltalk_joke', 'smalltalk_bot'];
        if (!nonFillerIntents.includes(intent) && Math.random() < 0.45) {
          const transition = TRANSITIONS[Math.floor(Math.random() * TRANSITIONS.length)];
          reply = transition + " " + reply;
        }

        return reply;
      }

      // Contextual fallback
      lastIntent = null;
      return FALLBACK_RESPONSES[fallbackIdx++ % FALLBACK_RESPONSES.length];
    }

    function handleSend(text) {
      if (isTyping) return; 
      
      const trimmed = (typeof text === 'string' ? text : inputEl.value).trim();
      if (!trimmed) return;

      isTyping = true;
      inputEl.disabled = true;
      sendBtn.disabled = true;

      addMessage(trimmed, true);
      inputEl.value = '';
      quickEl.innerHTML = '';

      showTyping();
      
      const response = findResponse(trimmed);
      
      // Dynamic typing simulation speed (approx 10ms per char + base offset)
      const typeDelay = Math.min(response.length * 10 + 350, 2000);
      
      setTimeout(() => {
        hideTyping();
        addMessage(response, false);

        isTyping = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();

        setTimeout(() => {
          renderQuickReplies(QUICK_SUGGESTIONS.sort(() => 0.5 - Math.random()).slice(0, 3));
        }, 300);
      }, typeDelay);
    }

    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !isTyping) handleSend();
    });

    // ─── Initial Boot & Fetch Loader ───
    async function bootChatbot() {
      try {
        // Disable input until data is loaded
        inputEl.disabled = true;
        sendBtn.disabled = true;

        const [kbRes, configRes] = await Promise.all([
          fetch('/data/chatbot-data.json'),
          fetch('/data/site.config.json')
        ]);

        KB = await kbRes.json();
        config = await configRes.json();

        // Enable input
        inputEl.disabled = false;
        sendBtn.disabled = false;
        
        // Show welcome message
        setTimeout(() => {
          addMessage("Hi! 👋 I'm **Aaryan's AI Assistant**.\n\nI know everything about Aaryan's technical project management services, micro-SaaS software (like TokenQ and RxPad Pro), and his work in Jaipur and Ahmedabad.\n\nWhat would you like to explore?", false);
          setTimeout(() => renderQuickReplies(QUICK_SUGGESTIONS.slice(0, 3)), 600);
        }, 500);

      } catch (err) {
        console.error("Failed to load chatbot data:", err);
        // Fallback message
        addMessage("Hi! 👋 I'm **Aaryan's AI Assistant**. I'm currently running in offline fallback mode. How can I help you? You can ask about his services, projects, or contact info.", false);
        inputEl.disabled = false;
        sendBtn.disabled = false;
      }
    }

    bootChatbot();
  </script>
