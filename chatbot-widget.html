<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaryan AI Assistant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base: #030D0A;
      --bg-surface: #0A1612;
      --bg-card: #0F1F1A;
      --bg-input: #132A23;
      --accent: #0D9488;
      --accent-glow: rgba(13, 148, 136, 0.25);
      --accent-soft: rgba(13, 148, 136, 0.08);
      --text-primary: #E8F5F0;
      --text-secondary: #8FABA3;
      --text-muted: #4A6B62;
      --bd-subtle: rgba(13, 148, 136, 0.12);
      --bot-bubble: #0F1F1A;
      --user-bubble: #0D9488;
      --radius: 16px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg-base);
      font-family: var(--font);
      color: var(--text-primary);
      overflow: hidden;
    }

    .chat-app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 100%;
    }

    /* ─── Header ─── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--bd-subtle);
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #065F56);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      position: relative;
      flex-shrink: 0;
    }

    .chat-avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10B981;
      border: 2px solid var(--bg-surface);
    }

    .chat-header-info h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .chat-header-info span {
      font-size: 11px;
      color: var(--accent);
      font-family: var(--mono);
      font-weight: 500;
    }

    .chat-header-badge {
      margin-left: auto;
      background: var(--accent-soft);
      border: 1px solid var(--bd-subtle);
      color: var(--accent);
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── Messages Area ─── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

    .msg-group {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .msg-group.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar-sm {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #065F56);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-group.user .avatar-sm {
      background: linear-gradient(135deg, #6366F1, #4338CA);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-primary);
      background: var(--bot-bubble);
      border: 1px solid var(--bd-subtle);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      word-break: break-word;
    }

    .msg-group.user .msg-bubble {
      background: var(--user-bubble);
      color: #fff;
      border-color: transparent;
      border-radius: var(--radius);
      border-top-right-radius: 4px;
      border-top-left-radius: var(--radius);
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--mono);
      padding: 0 4px;
    }

    .msg-group.user .msg-time {
      text-align: right;
    }

    /* ─── Typing Indicator ─── */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      margin-bottom: 8px;
    }

    .typing-indicator.show { display: flex; }

    .typing-dots {
      display: flex;
      gap: 4px;
      background: var(--bot-bubble);
      border: 1px solid var(--bd-subtle);
      padding: 10px 16px;
      border-radius: var(--radius);
      border-top-left-radius: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotBounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ─── Quick Replies ─── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 12px;
    }

    .quick-btn {
      background: var(--accent-soft);
      border: 1px solid var(--bd-subtle);
      color: var(--accent);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* ─── Input Bar ─── */
    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--bg-surface);
      border-top: 1px solid var(--bd-subtle);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--bd-subtle);
      border-radius: 24px;
      padding: 10px 18px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input::placeholder { color: var(--text-muted); }
    .chat-input:focus { border-color: var(--accent); }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* ─── Animations ─── */
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .chat-header { padding: 10px 14px; }
      .chat-messages { padding: 14px; }
      .quick-replies { padding: 0 14px 10px; }
      .chat-input-bar { padding: 10px 14px; }
      .msg-group { max-width: 92%; }
      .chat-header-badge { display: none; }
    }
  </style>

  <!-- Favicons + PWA -->
  <link rel="icon" href="/assets/images/icons/icon.png" type="image/png">
  <link rel="icon" href="/assets/images/icons/icon.svg" sizes="any" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/images/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
</head>
<body>
  <div class="chat-app">
    <!-- Header -->
    <div class="chat-header">
      <img loading="lazy" decoding="async" src="/assets/images/icons/aibot.png" alt="AI" class="chat-avatar" style="object-fit:cover; background:var(--bg-card); padding:2px; font-size:0;">
      <div class="chat-header-info">
        <h1>Aaryan AI Assistant</h1>
        <span>● Online — Ready to help</span>
      </div>
      <div class="chat-header-badge">AI Powered</div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <img loading="lazy" decoding="async" src="/assets/images/icons/aibot.png" alt="AI" class="avatar-sm" style="object-fit:cover; background:var(--bg-card); padding:2px; font-size:0;">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Quick Replies -->
    <div class="quick-replies" id="quickReplies"></div>

    <!-- Input -->
    <div class="chat-input-bar">
      <input type="text" class="chat-input" id="chatInput" placeholder="Ask me anything about Aaryan..." autocomplete="off">
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    // ─── Humanized Knowledge Base ───
    const KB = {
      greeting: {
        patterns: ['hello', 'hi', 'hey', 'greetings', 'sup', 'yo', 'hola', 'namaste'],
        responses: [
          "Hey there! 👋 I'm Aaryan's AI assistant. What can I help you discover about his work?",
          "Hi! 😊 I'm here to answer any questions about Aaryan's projects, skills, or services. What's on your mind?",
          "Hello! I'm Aaryan's virtual assistant. How can I assist you today? 🚀"
        ]
      },
      about: {
        patterns: ['who is aaryan', 'about aaryan', 'tell me about', 'who are you', 'introduce', 'about yourself', 'about him', 'background'],
        responses: [
          "Aaryan is a Technical Project Manager who excels at HealthTech digital transformation, SaaS product delivery, and AI automation! 🚀 Do you want to hear more about his specific tech stack or his experience?",
          "He's a TPM based in Jaipur, India, with a knack for bridging complex tech with smooth execution. Would you like to know about his projects or his background?"
        ]
      },
      skills: {
        patterns: ['skills', 'tech stack', 'technologies', 'what can he do', 'expertise', 'capable', 'proficient', 'tools', 'programming', 'code'],
        responses: [
          "Aaryan's stack is pretty solid! ⚡ He works with React.js, Next.js, Node.js, and Python, and uses tools like Botpress and Vercel. Want to see some projects built with these?",
          "He specializes in Frontend (React/Next), Backend (Node/Express), and AI/ML (OpenAI/Botpress). Should I show you his open-source work?"
        ]
      },
      projects: {
        patterns: ['projects', 'work', 'portfolio', 'built', 'created', 'developed', 'case studies', 'showcase'],
        responses: [
          "He's built some amazing things! 🔹 **ProjectPort** (a SaaS platform), 🔹 **UiBrium** (an NPM UI library), and this very AI bot. Which one sounds interesting?",
          "Aaryan has shipped several cool products, including HealthTech EMRs, SaaS onboarding platforms, and open-source UI libraries. Want details on a specific one?"
        ]
      },
      projectport: {
        patterns: ['projectport', 'project port', 'onboarding platform', 'saas platform'],
        responses: [
          "**ProjectPort** is a SaaS client onboarding platform that achieved 40% faster onboarding! It uses React, Node, and MongoDB. Want the link to the live demo?",
          "Ah, **ProjectPort**! It's a full-stack SaaS that automates document signing and Slack notifications. It really streamlined client onboarding."
        ]
      },
      uibrium: {
        patterns: ['uibrium', 'ui library', 'component library', 'npm package', 'react components'],
        responses: [
          "**UiBrium** is an open-source React UI library tailored for dark-mode dashboards. It actually has over 2000 NPM downloads! Pretty cool, right?",
          "That's his open-source component library. It boasts 100% A11y compliance and is built with React + Tailwind. Want the link?"
        ]
      },
      aibot: {
        patterns: ['ai bot', 'chatbot', 'aryanony bot', 'conversational', 'assistant', 'how do you work'],
        responses: [
          "You're actually talking to a simulated version of the **Aryanony AI Bot** right now! 😄 The real one integrates with Botpress and OpenAI to cut support tickets by 60%.",
          "The **Aryanony AI Bot** is an intelligent assistant that captures leads and handles support. Want me to tell you about his other automation services?"
        ]
      },
      services: {
        patterns: ['services', 'offer', 'provide', 'consulting', 'hire', 'freelance', 'work with'],
        responses: [
          "Aaryan offers HealthTech Consulting, Technical Project Management, AI & Automation, and Micro-SaaS development. Are you looking to hire him for a project?",
          "He provides top-tier consulting for HealthTech, SaaS development, and AI chatbot integrations. Want to book a quick call with him?"
        ]
      },
      contact: {
        patterns: ['contact', 'reach', 'email', 'phone', 'call', 'connect', 'get in touch', 'hire', 'talk to him'],
        responses: [
          "You can easily reach Aaryan via email at aaryangupta.pm@gmail.com, or book a call at calendly.com/aaryanpm/30min. Should I give you his WhatsApp too?",
          "Best way is through email (aaryangupta.pm@gmail.com) or LinkedIn! He's always open to discussing new opportunities."
        ]
      },
      experience: {
        patterns: ['experience', 'career', 'work history', 'resume', 'professional', 'years', 'companies'],
        responses: [
          "Aaryan has 3+ years of experience delivering projects across 70+ markets! He's managed over 20 projects end-to-end. Want to know more about his HealthTech expertise?",
          "He's been in the game for over 3 years, specializing in SaaS and HealthTech delivery. His superpower is aligning developers with business goals."
        ]
      },
      healthtech: {
        patterns: ['healthtech', 'healthcare', 'medical', 'clinic', 'hospital', 'doctor', 'emr', 'patient'],
        responses: [
          "Aaryan has deep expertise in Indian Healthcare IT. He's built EMR/EHR systems, diagnostic trackers, and patient management software! Are you in the healthcare space?",
          "His HealthTech work is top-notch—building self-hosted OPD management and clinic software with zero recurring SaaS fees for doctors."
        ]
      },
      smalltalk_howareyou: {
        patterns: ['how are you', 'how do you do', 'how is it going', 'whats up'],
        responses: [
          "I'm doing fantastic, thanks for asking! 😊 Just here helping showcase Aaryan's awesome work. How can I help you?",
          "I'm great! I don't need coffee, but I'm always energized to talk about tech. What brings you to Aaryan's portfolio?"
        ]
      },
      smalltalk_joke: {
        patterns: ['tell me a joke', 'make me laugh', 'joke'],
        responses: [
          "Why do programmers prefer dark mode? Because light attracts bugs! 🐛😂",
          "There are 10 types of people in the world: those who understand binary, and those who don't! 🤓"
        ]
      },
      smalltalk_bot: {
        patterns: ['are you a bot', 'are you human', 'are you real', 'are you a machine'],
        responses: [
          "I'm an AI assistant! 🤖 I don't have feelings, but I'm programmed to be super helpful. Do you have any questions about Aaryan's work?",
          "I am an AI, yes! But I try to be as friendly as possible. 😊 How can I assist you today?"
        ]
      },
      thanks: {
        patterns: ['thanks', 'thank you', 'thx', 'appreciate', 'helpful', 'great', 'awesome', 'cool', 'nice'],
        responses: [
          "You're very welcome! 😊 Let me know if anything else catches your eye.",
          "Anytime! Glad I could help. Feel free to explore more of the portfolio! 🚀",
          "You got it! ✨ Let me know if you want to book a call with Aaryan."
        ]
      },
      bye: {
        patterns: ['bye', 'goodbye', 'see you', 'later', 'exit', 'quit', 'close'],
        responses: [
          "Goodbye! 👋 Have a wonderful day. Aaryan's just an email away if you need him!",
          "Catch you later! Don't hesitate to reach out to Aaryan at aaryangupta.pm@gmail.com! ✨"
        ]
      }
    };

    const QUICK_SUGGESTIONS = [
      { text: "👤 About Aaryan", query: "Tell me about Aaryan" },
      { text: "🛠️ Skills", query: "What are his skills?" },
      { text: "🚀 Projects", query: "Show me his projects" },
      { text: "💼 Services", query: "What services does he offer?" },
      { text: "📞 Contact", query: "How to contact him?" },
      { text: "🏥 HealthTech", query: "Tell me about his HealthTech work" }
    ];

    const FALLBACK_RESPONSES = [
      "That's an interesting point! While I might not have a specific answer for that, I can tell you about Aaryan's **projects**, **skills**, **services**, or **how to get in touch**. What interests you?",
      "Hmm, I'm just a simulated assistant, so I might have misunderstood. 😅 Try asking me about his work experience, tech stack, or his HealthTech consulting services!",
      "I don't have information on that specific topic, but I'm great at answering questions about Aaryan's portfolio! Ask about his projects, skills, or services. 🚀"
    ];

    // ─── Chat Logic & State ───
    const messagesEl = document.getElementById('chatMessages');
    const inputEl = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typingIndicator');
    const quickEl = document.getElementById('quickReplies');
    let fallbackIdx = 0;
    let lastIntent = null; // Contextual memory
    let isTyping = false;  // Lock to prevent multi-message glitches

    function getTime() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function addMessage(text, isUser = false) {
      const group = document.createElement('div');
      group.className = `msg-group ${isUser ? 'user' : 'bot'}`;
      group.innerHTML = `
        ${isUser ? '<div class="avatar-sm">You</div>' : '<img loading="lazy" decoding="async" src="/assets/images/icons/aibot.png" alt="AI" class="avatar-sm" style="object-fit:cover; background:var(--bg-card); padding:2px; font-size:0;">'}
        <div class="msg-content">
          <div class="msg-bubble">${formatText(text)}</div>
          <span class="msg-time">${getTime()}</span>
        </div>
      `;
      messagesEl.appendChild(group);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      typingEl.classList.add('show');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      typingEl.classList.remove('show');
    }

    function renderQuickReplies(suggestions) {
      quickEl.innerHTML = suggestions.map(s =>
        `<button class="quick-btn" data-query="${s.query}">${s.text}</button>`
      ).join('');

      quickEl.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          handleSend(btn.dataset.query);
        });
      });
    }

    // Levenshtein Distance for fuzzy matching typos
    function getLevenshteinDistance(a, b) {
      if (!a || !b) return 0;
      const matrix = [];
      for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
      for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
          }
        }
      }
      return matrix[b.length][a.length];
    }

    // Advanced NLP Token Matcher
    function matchIntent(input) {
      const rawInput = input.toLowerCase().trim();
      const cleanInput = rawInput.replace(/[^\w\s]/gi, ''); // remove punctuation for fuzzy matching
      const words = cleanInput.split(/\s+/);

      for (const [key, entry] of Object.entries(KB)) {
        for (const pattern of entry.patterns) {
          // Exact sub-string match (fast path) - check raw and clean
          if (rawInput.includes(pattern) || cleanInput.includes(pattern.replace(/[^\w\s]/gi, ''))) {
             return key;
          }

          // Token-based fuzzy match
          const patternWords = pattern.split(/\s+/);
          if (patternWords.length === 1) {
             // Single-word intent (e.g. "skills"): check if any user word matches with slight typos
             for(let word of words) {
                if (Math.abs(word.length - pattern.length) <= 2) {
                    const dist = getLevenshteinDistance(word, pattern);
                    if (dist <= 1 && pattern.length > 3) return key; // Allow 1 typo
                    if (dist === 0) return key;
                }
             }
          } else {
             // Multi-word intent (e.g. "who is aaryan"): 
             // If they typed at least 80% of the words correctly, we consider it a hit
             let matches = 0;
             for (let pWord of patternWords) {
                if (words.includes(pWord)) matches++;
             }
             if (patternWords.length > 1 && (matches / patternWords.length >= 0.75)) {
                return key;
             }
          }
        }
      }
      return null;
    }

    function findResponse(input) {
      const lower = input.toLowerCase().trim().replace(/[^\w\s]/gi, '');
      
      // Contextual Follow-up Memory
      const isAffirmative = lower === 'yes' || lower === 'sure' || lower.includes('tell me more') || lower === 'yeah' || lower === 'yep' || lower === 'link' || lower === 'show me';
      if (lastIntent && isAffirmative) {
          if (lastIntent === 'skills') return "Awesome! Check out his GitHub to see his code in action: github.com/aryanony";
          if (lastIntent === 'projects' || lastIntent === 'projectport' || lastIntent === 'uibrium') return "You can see live demos of ProjectPort and UiBrium right here in the portfolio! They really showcase his full-stack abilities.";
          if (lastIntent === 'healthtech') return "His HealthTech work involves building robust EMRs and reducing patient wait times using AI. It's incredibly impactful.";
          if (lastIntent === 'services') return "Great! You can easily book a 30-min discovery call at calendly.com/aaryanpm/30min to discuss your requirements.";
      }

      const intent = matchIntent(input);
      if (intent) {
        lastIntent = intent;
        const responses = KB[intent].responses;
        // Randomly select one of the varied responses to sound more human
        return responses[Math.floor(Math.random() * responses.length)];
      }

      // Contextual fallback
      lastIntent = null;
      return FALLBACK_RESPONSES[fallbackIdx++ % FALLBACK_RESPONSES.length];
    }

    function handleSend(text) {
      if (isTyping) return; // Prevent multi-message spam glitch
      
      const trimmed = (typeof text === 'string' ? text : inputEl.value).trim();
      if (!trimmed) return;

      // Lock UI
      isTyping = true;
      inputEl.disabled = true;
      sendBtn.disabled = true;

      addMessage(trimmed, true);
      inputEl.value = '';
      quickEl.innerHTML = '';

      // Immediately show typing indicator (no awkward pause)
      showTyping();
      
      const response = findResponse(trimmed);
      
      // Simulate human typing time (approx 15ms per character + base delay, max 2.5s)
      const typeDelay = Math.min(response.length * 15 + 400, 2500);
      
      setTimeout(() => {
        hideTyping();
        addMessage(response, false);

        // Unlock UI
        isTyping = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();

        // Show dynamic quick replies after a short breath
        setTimeout(() => {
          renderQuickReplies(QUICK_SUGGESTIONS.sort(() => 0.5 - Math.random()).slice(0, 3));
        }, 400);
      }, typeDelay);
    }

    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !isTyping) handleSend();
    });

    // ─── Initial Boot ───
    setTimeout(() => {
      addMessage("Hi! 👋 I'm **Aaryan's AI Assistant**. I know everything about his work, skills, projects, and services.\n\nWhat would you like to explore?", false);
      setTimeout(() => renderQuickReplies(QUICK_SUGGESTIONS.slice(0, 3)), 800);
    }, 800);
  </script>
</body>
</html>
